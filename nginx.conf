# nginx.conf
# ─────────────────────────────────────────────────────────────
# Serves the Answers in AI static site.
# Subdomain routing (jesus.answersinai.com) is handled at the
# DNS/reverse-proxy level — nginx just serves the same index.html
# for all requests and lets app.js read window.location.hostname.

server {
    listen 80;
    server_name _;          # catch-all: works for any subdomain

    root /usr/share/nginx/html;
    index index.html;

    # Cache static assets aggressively
    location ~* \.(js|css|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API proxy → FastAPI container (keeps Anthropic key server-side)
    # Streaming requires buffering off and HTTP/1.1 keepalive
    location /api/ {
        proxy_pass http://proxy:8000/;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        chunked_transfer_encoding on;
    }

    # All other routes fall back to index.html (SPA-style)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml;
    gzip_min_length 1000;
}
